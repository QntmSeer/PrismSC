name: clinical-sc-omics
channels:
  - conda-forge
  - bioconda
  - pytorch
  - defaults
dependencies:
  - python>=3.10,<3.12
  - numpy>=1.22,<2.0
  - pandas>=1.5
  - scikit-learn
  - matplotlib
  - seaborn
  - jinja2
  - pip
  - pip:
      - scanpy>=1.10
      - muon>=0.1.5
      - mudata>=0.2.3
      - scvi-tools>=1.1
      - cellrank>=2.0
      - celltypist>=1.6
      - multiqc>=1.21
      - torch>=2.0
